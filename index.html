<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Boutique Alpha X Omega</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        :root { --bg-black: #050505; --gold-accent: #dca331; --green-accent: #174b2f; --red-accent: #b22025; --text-white: #f4f4f4; }
        body { background-color: var(--bg-black); color: var(--text-white); font-family: 'Montserrat', sans-serif; margin: 0; }
        
        /* Header */
        header { padding: 20px 5%; display: flex; justify-content: space-between; border-bottom: 3px solid var(--green-accent); align-items: center; }
        .logo { font-size: 2rem; font-weight: 900; color: var(--gold-accent); }
        .logo span { color: var(--red-accent); }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav ul li a { color: var(--text-white); text-decoration: none; font-weight: 700; }

        /* Hero */
        .hero { padding: 80px 5%; text-align: center; background: radial-gradient(circle, #174b2f22, #050505); }
        .hero h1 { font-size: 3.5rem; color: var(--gold-accent); }
        .price { font-size: 2rem; color: var(--gold-accent); margin: 20px 0; }
        .btn { padding: 15px 40px; background: var(--gold-accent); color: #000; font-weight: 900; text-decoration: none; border-radius: 30px; }

        /* Galerie */
        .gallery-section { padding: 80px 5%; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .gallery-item { border: 2px solid var(--green-accent); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .gallery-item:hover { border-color: var(--gold-accent); transform: scale(1.05); }
        .gallery-item img { width: 100%; display: block; }

        /* Contact */
        footer { padding: 50px; text-align: center; border-top: 2px solid #1a1a1a; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ALPHA <span>X</span> OMEGA</div>
        <nav><ul><li><a href="#">Accueil</a></li><li><a href="#galerie">Galerie</a></li><li><a href="#contact">Contact</a></li></ul></nav>
    </header>

    <section class="hero">
        <h1>ALPHA X OMEGA Collection</h1>
        <p>Qualité supérieure et design exclusif.</p>
        <div class="price">3500 DA</div>
        <a href="#contact" class="btn">COMMANDER</a>
    </section>

    <!-- معرض الصور -->
    <section class="gallery-section" id="galerie">
        <h2 style="text-align:center; color: var(--gold-accent); margin-bottom: 40px;">Notre Galerie</h2>
        <div class="gallery-grid">

            <div class="gallery-item"><img src="image_3.png" alt="Produit"></div>
            <div class="gallery-item"><img src="image_4.png" alt="Produit"></div>

    </section>

    <footer id="contact">
        <h2>Contactez-nous</h2>
        <p>Tel: +213 0519461946</p>

</body>
</html>
